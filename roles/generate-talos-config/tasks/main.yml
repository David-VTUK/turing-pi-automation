---
- name: Ensure Talos configuration output directory exists
  ansible.builtin.file:
    path: "{{ talos_output_dir }}"
    state: directory
    mode: '0755'
  delegate_to: localhost

- name: Template Control Plane patch file
  ansible.builtin.template:
    src: cp-patch.yaml.j2
    dest: "{{ talos_output_dir }}/cp-patch.yaml"
    mode: '0600'
  delegate_to: localhost

- name: Template Worker patch file
  ansible.builtin.template:
    src: worker-patch.yaml.j2
    dest: "{{ talos_output_dir }}/worker-patch.yaml"
    mode: '0600'
  delegate_to: localhost

- name: Generate custom Talos configurations
  ansible.builtin.command: >
    talosctl gen config {{ talos_cluster_name }} https://{{ talos_controlplane_ip }}:6443
    --output-dir {{ talos_output_dir }}
    --config-patch-control-plane @{{ talos_output_dir }}/cp-patch.yaml
    --config-patch-worker @{{ talos_output_dir }}/worker-patch.yaml
    --force
  delegate_to: localhost
  register: talos_gen
  changed_when: true

- name: Clean up temporary patch files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ talos_output_dir }}/cp-patch.yaml"
    - "{{ talos_output_dir }}/worker-patch.yaml"
  delegate_to: localhost

- name: Display generation success
  ansible.builtin.debug:
    msg: "Successfully generated fresh, securely patched Talos configs at {{ talos_output_dir }}"
