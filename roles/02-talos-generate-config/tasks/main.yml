- name: Generate and configure Talos cluster baseline
  run_once: true
  vars:
    talos_output_dir: "{{ playbook_dir }}/talos-configs"
    talos_cluster_name: "turing-cluster"
    talos_controlplane_ip: "{{ hostvars[groups['control_plane'][0]]['ansible_host'] }}"
  block:
    - name: Ensure Talos configuration output directory exists
      ansible.builtin.file:
        path: "{{ talos_output_dir }}"
        state: directory
        mode: '0700'

    - name: Template patch files
      ansible.builtin.template:
        # Ansible automatically looks in roles/02-talos-generate-config/templates/
        src: "{{ item.src }}"
        dest: "{{ talos_output_dir }}/{{ item.dest }}"
        mode: '0600'
      loop:
        - { src: 'cp-patch.yaml.j2', dest: 'cp-patch.yaml' }
        - { src: 'worker-patch.yaml.j2', dest: 'worker-patch.yaml' }

    - name: Generate custom Talos configurations
      ansible.builtin.command: >
        talosctl gen config {{ talos_cluster_name }} https://{{ talos_controlplane_ip }}:6443
        --output-dir {{ talos_output_dir }}
        --config-patch-control-plane @{{ talos_output_dir }}/cp-patch.yaml
        --config-patch-worker @{{ talos_output_dir }}/worker-patch.yaml
      args:
        creates: "{{ talos_output_dir }}/talosconfig"
      no_log: true

    - name: Set Talos API endpoint in talosconfig
      ansible.builtin.command: >
        talosctl --talosconfig {{ talos_output_dir }}/talosconfig
        config endpoint {{ talos_controlplane_ip }}
      changed_when: true

  always:
    - name: Clean up temporary patch files
      ansible.builtin.file:
        path: "{{ talos_output_dir }}/{{ item }}"
        state: absent
      loop:
        - cp-patch.yaml
        - worker-patch.yaml

- name: Display generation success
  ansible.builtin.debug:
    msg: "Talos configurations are present and secured at {{ playbook_dir }}/talos-configs"
  run_once: true
