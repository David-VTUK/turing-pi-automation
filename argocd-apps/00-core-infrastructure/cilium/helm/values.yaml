cilium:
  bgpControlPlane:
    enabled: true
  cgroup:
    autoMount:
      enabled: false
    hostRoot: /sys/fs/cgroup
  gatewayAPI:
    enabled: true
  hubble:
    relay:
      enabled: true
    ui:
      enabled: true
  ipam:
    mode: kubernetes
  k8sServiceHost: 172.16.10.31
  k8sServicePort: 6443
  kubeProxyReplacement: true
  securityContext:
    privileged: true
  namespaceOverride: cilium