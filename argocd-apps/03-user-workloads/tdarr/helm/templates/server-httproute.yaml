apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tdarr
  labels:
    app: tdarr
spec:
  parentRefs:
    - name: cilium-api-gateway
      sectionName: https-gateway
      namespace: cilium
  hostnames:
    - tdarr.virtualthoughts.co.uk
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: tdarr
          port: 8265
