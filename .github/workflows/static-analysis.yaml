name: Helm Static Analysis
env:
  K8S-VERSION: "1.34.1"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'argocd-apps/**' 

jobs:
  detect-changes:
    name: Detect Changed Charts
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: argocd-apps/**
          dir_names: true
          json: true
          matrix: true 

      - name: Set matrix output
        id: set-matrix
        if: steps.changed-files.outputs.any_changed == 'true'
        run: echo "matrix=${{ steps.changed-files.outputs.all_changed_files }}" >> $GITHUB_OUTPUT

  validate:
    name: Validate Chart
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # If one chart fails, keep validating the others
      matrix: 
        chart_dir: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Chart.yaml Exists
        id: check-chart
        run: |
          if [ -f "${{ matrix.chart_dir }}/Chart.yaml" ]; then
            echo "valid_chart=true" >> $GITHUB_OUTPUT
          else
            echo "Skipping ${{ matrix.chart_dir }}: Not a Helm chart directory."
            echo "valid_chart=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Install Tools
        if: steps.check-chart.outputs.valid_chart == 'true'
        run: |
          # Install Kubeconform
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz | tar -xz
          sudo mv kubeconform /usr/local/bin/

      - name: Setup Helm
        if: steps.check-chart.outputs.valid_chart == 'true'
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Build Helm Dependencies
        if: steps.check-chart.outputs.valid_chart == 'true'
        run: helm dependency build "${{ matrix.chart_dir }}" || echo "No dependencies to build."

      - name: Template Helm Chart
        if: steps.check-chart.outputs.valid_chart == 'true'
        run: helm template test-release "${{ matrix.chart_dir }}" > rendered-manifest.yaml

      - name: Show Rendered Manifest
        if: steps.check-chart.outputs.valid_chart == 'true'
        run: cat rendered-manifest.yaml

      - name: Pluto Setup (Deprecation Check)
        if: steps.check-chart.outputs.valid_chart == 'true'
        uses: FairwindsOps/pluto/github-action@master

      - name: Pluto Scan (Deprecation Check)
        if: steps.check-chart.outputs.valid_chart == 'true'
        run: |
          pluto detect-files -d rendered-manifest.yaml --target-versions k8s=v${{ env.K8S-VERSION }} 

      - name: Kubeconform (Schema Check)
        if: steps.check-chart.outputs.valid_chart == 'true'
        run: kubeconform -strict -ignore-missing-schemas -kubernetes-version ${{ env.K8S-VERSION }} rendered-manifest.yaml
