  connection: local
  gather_facts: false
  vars:
    tpi_flash_nodes_bmc_ip: "172.16.10.30" # Replace with your BMC IP
    tpi_flash_nodes_image_path: "/tmp/metal-arm64.raw.xz"
  roles:
    - tpi_flash_nodes

